<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Grana Simples</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">

<div class="login-container">

    <h1>Entrar</h1>
    <p>Acesse sua conta para continuar</p>

    {% if erro %}
        <div class="toast toast-erro">{{ erro }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.login') }}">
        <input type='hidden' name="csrf_token" value="{{ csrf_token() }}">
       
        <label class="auth-field">
            <span>Email</span>
            <input type="email" name="email" placeholder="seu@email.com" value="{{ email or '' }}" autocomplete="email" required autofocus>
        </label>

        <label class="auth-field">
            <span>Senha</span>
            <div class="password-field">
                <input type="password" name="senha" placeholder="Sua senha" autocomplete="current-password" required>
                <button type="button" class="password-toggle" aria-label="Mostrar senha">Mostrar</button>
            </div>
        </label>

        <button type="submit" class="btn">Entrar</button>
    </form>

    <p class="auth-footer">
        Não tem conta?
        <a href="{{ url_for('auth.register') }}">Criar conta</a>
    </p>

</div>

<script>
    document.querySelectorAll(".password-toggle").forEach((botao) => {
        botao.addEventListener("click", () => {
            const campo = botao.parentElement.querySelector("input");
            const mostrar = campo.type === "password";
            campo.type = mostrar ? "text" : "password";
            botao.textContent = mostrar ? "Ocultar" : "Mostrar";
        });
    });
</script>

</body>
</html>
